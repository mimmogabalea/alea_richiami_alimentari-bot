name: Controllo richiami alimentari

on:
  schedule:
    # Ogni giorno alle 7:00 UTC (8:00 o 9:00 in Italia, a seconda dell'ora legale)
    - cron: "0 7 * * *"
  workflow_dispatch: {}  # permette anche l'avvio manuale da GitHub

permissions:
  contents: write  # necessario per ricommittare seen.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Imposta Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Esegui il controllo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py

      - name: Salva lo stato aggiornato nel repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "Aggiorna elenco avvisi notificati"
          git push
